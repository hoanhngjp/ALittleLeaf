name: CI - Build and Test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  # ── Backend Web API build ──────────────────────────────────────────────────
  build-api:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Backend Docker image
      run: docker build -f Backend/ALittleLeaf.Api/Dockerfile -t alittleleaf-api:ci .

  # ── Frontend build ─────────────────────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Frontend Docker image
      run: docker build -f Frontend/Dockerfile -t alittleleaf-frontend:ci ./Frontend

  # ── Backend API unit tests ─────────────────────────────────────────────────
  test-api:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create .env file
      run: |
        cat <<EOF > .env
        MSSQL_SA_PASSWORD=${{ secrets.MSSQL_SA_PASSWORD }}
        JWT_SECRET=${{ secrets.JWT_SECRET }}
        CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
        CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
        CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
        VNPAY_TMNCODE=${{ secrets.VNPAY_TMNCODE }}
        VNPAY_HASHSECRET=${{ secrets.VNPAY_HASHSECRET }}
        EOF

    - name: Run API Unit Tests
      run: |
        docker build -f Dockerfile.test.api -t alittleleaf-test-api:ci .
        docker run --rm alittleleaf-test-api:ci
